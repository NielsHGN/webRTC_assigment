<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift Racer - Desktop</title>
    <link rel="stylesheet" href="/css/screen.css">
</head>

<body>
    <div class="screen-start-overlay">
        <div class="start-card">
            <h2>🏁 Welkom bij Drift Racer</h2>
            <p>Doel: rijd zo ver mogelijk zonder tegen de auto's te botsen.</p>
            <p>Vermijd olievlekken, want dan glijdt je auto tijdelijk.</p>
            <div class="intro-qr"></div>
            <a class="intro-url" href="" target="_blank">Controller link</a>
            <p class="intro-hint">Scan de QR direct met je gsm (landscape mode).</p>
        </div>
    </div>

    <!-- Racebaan achtergrond -->
    <!-- Racebaan achtergrond met scrollende wegstreep -->
    <div class="track">
        <div class="road-stripe"></div>
    </div>
    <!-- Auto die beweegt op basis van controller input -->
    <div class="car"></div>
    <!-- Score teller -->
    <div class="score-display">0m</div>
    <div class="effect-display">SLIPPERY!</div>
    <!-- Game Over overlay -->
    <div class="game-over">
        <h1>CRASH!</h1>
        <p class="final-score"></p>
        <p class="best-score"></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="/js/screen.js"></script>
</body>

</html>
