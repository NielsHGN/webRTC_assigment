<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controller</title>
    <link rel="stylesheet" href="/css/controller.css">
</head>

<body>
    <div class="sensor-overlay">
        <p>Safari vereist toestemming voor de gyroscoop (stuur)</p>
        <button class="sensor-btn">🎮 Activeer Stuur</button>
    </div>

    <div class="controller-start-overlay">
        <div class="start-card">
            <h2>Controller Uitleg</h2>
            <p>Houd je gsm in <strong>landscape mode</strong> (liggend).</p>
            <p>Kantel je gsm links/rechts om te sturen.</p>
            <p>Houd GAS ingedrukt om te versnellen.</p>
            <p>Houd REM ingedrukt om te vertragen.</p>
            <button class="btn-start-controller">Start nu</button>
        </div>
    </div>

    <!-- Status bar toont verbindingsstatus -->
    <div class="status-bar">Koppelen met pc...</div>

    <!-- Knoppen voor gas en rem (aangestuurd door aanraken) -->
    <div class="controls">
        <div class="btn btn-brake" aria-label="Rem"></div>
        <div class="btn btn-gas" aria-label="Gas"></div>
    </div>
    <div class="restart-wrap">
        <button class="btn-restart">RESTART</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="/js/controller.js"></script>
</body>

</html>
