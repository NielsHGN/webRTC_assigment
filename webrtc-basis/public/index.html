<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift Racer - Desktop</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2c3e50;
            font-family: sans-serif;
        }

        .track {
            position: absolute;
            width: 100%;
            height: 100%;
            border-left: 10px dashed #7f8c8d;
            border-right: 10px dashed #7f8c8d;
            box-sizing: border-box;
        }

        #menu {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 10;
            text-align: center;
        }

        #menu h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #333;
        }

        #url {
            display: block;
            font-size: 10px;
            color: gray;
            margin-top: 10px;
            text-decoration: none;
            word-break: break-all;
            max-width: 150px;
        }

        .car {
            position: absolute;
            width: 50px;
            height: 90px;
            background-color: #e74c3c;
            border-radius: 8px;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease-out, background-color 0.2s;
        }

        .car.gas {
            box-shadow: 0 20px 30px rgba(241, 196, 15, 0.6);
        }

        .car.brake {
            background-color: #c0392b;
            border-bottom: 5px solid #ff0000;
        }
    </style>
</head>

<body>
    <div class="track"></div>
    <div id="menu">
        <h2>Scan om te racen</h2>
        <div id="qr"></div>
        <a id="url" href="" target="_blank">Link</a>
    </div>
    <div id="car" class="car"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script>
        const $url = document.getElementById('url');
        const $car = document.getElementById('car');
        let socket;
        let peer;

        const init = () => {
            socket = io.connect('/');

            socket.on('connect', () => {
                const url = `${new URL(`/controller.html?id=${socket.id}`, window.location)}`;
                $url.textContent = url;
                $url.setAttribute('href', url);

                const qr = qrcode(4, 'L');
                qr.addData(url);
                qr.make();
                document.getElementById('qr').innerHTML = qr.createImgTag(4);
            });

            // Logica van de docent voor het afhandelen van de WebRTC handshake
            socket.on('signal', (myId, signal, peerId) => {
                document.getElementById('menu').style.opacity = '0.2'; // Verstop QR

                if (signal.type === 'offer') {
                    answerPeerOffer(myId, signal, peerId);
                } else if (peer) {
                    peer.signal(signal);
                }
            });
        };

        const answerPeerOffer = (myId, offer, peerId) => {
            peer = new SimplePeer(); // Desktop is NIET de initiator

            peer.on('signal', data => {
                socket.emit('signal', peerId, data);
            });

            // HIER KOMT DE DATA BINNEN VIA WEBRTC! (Vervangt peer.on('stream') uit de les)
            peer.on('data', data => {
                const carState = JSON.parse(data);

                let carPosition = (window.innerWidth / 2) + (carState.steer * 8);
                carPosition = Math.max(25, Math.min(window.innerWidth - 25, carPosition));
                $car.style.left = `${carPosition}px`;
                $car.style.transform = `translateX(-50%) rotate(${carState.steer / 2}deg)`;

                if (carState.gas) $car.classList.add('gas'); else $car.classList.remove('gas');
                if (carState.brake) $car.classList.add('brake'); else $car.classList.remove('brake');
            });
        };

        init();
    </script>
</body>

</html>
