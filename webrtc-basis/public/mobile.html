<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartphone Controller</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #222;
            color: white;
            padding-top: 50px;
        }

        h1 {
            color: #4CAF50;
        }
    </style>
</head>

<body>

    <h1 id="status">Verbinden...</h1>
    <p>Als dit scherm groen wordt, is de connectie gelukt!</p>

    <script>
        const socket = io(); // Verbind de smartphone met de server
        const statusText = document.getElementById('status');

        socket.on('connect', () => {
            statusText.innerText = "VERBONDEN!";
            document.body.style.backgroundColor = "#1a4a1c"; // Maak de achtergrond groen
        });
    </script>
</body>

</html>
